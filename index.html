<!DOCTYPE html>
<html>
<head>
<title>Sistema CETRAM RTP</title>

<!-- Librerías -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #ffffff;
    padding: 20px;
}

/* TITULO */
h2 {
    color: #2e7d32;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* FORMULARIO (MENÚ VERDE CLARO) */
.form {
    background: #e8f5e9;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    border-left: 6px solid #66bb6a;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* INPUTS */
input, select {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: #ffffff;
    min-width: 150px;
}

/* BOTONES */
button {
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.agregar { background: #2e7d32; color: white; }
.total { background: #388e3c; color: white; }
.excel { background: green; color: white; }
.pdf { background: red; color: white; }

/* BLOQUES */
.bloques {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

/* TARJETAS CETRAM */
.cetram-box {
    width: 320px;
    border: 1px solid #ddd;
    border-radius: 10px;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* ENCABEZADO CETRAM */
.cetram-box h3 {
    margin: 0;
    padding: 8px;
    background: #a5d6a7;
    text-align: center;
    border-radius: 10px 10px 0 0;
}

/* TABLAS */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #c8e6c9;
    color: black;
    font-size: 12px;
}

td {
    border: 1px solid #eee;
    text-align: center;
    padding: 6px;
    font-size: 12px;
}

/* RESUMEN */
.resumen-box {
    width: 350px;
    margin-top: 20px;
    border: 1px solid #ddd;
    padding: 10px;
    border-radius: 10px;
    background: #ffffff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.resumen-box h4 {
    margin-top: 0;
}
</style>
</head>

<body>

<h2>🟢 Sistema CETRAM RTP</h2>

<div class="form">

<select id="cetram">
<option value="">Seleccionar el Cetram</option>
<option>ZARAGOZA</option>
<option>PANTITLÁN</option>
<option>SANTA MARTA</option>
<option>INDIOS VERDES</option>
<option>POTRERO</option>
<option>LA RAZA</option>
<option>CHAPULTEPEC</option>
<option>MIXCOAC</option>
<option>UNIVERSIDAD</option>
<option>ZAPATA</option>
<option>CONSTITUCIÓN DE 1917</option>
<option>CENTRAL DE ABASTO</option>
<option>TASQUEÑA</option>
<option>HUIPULCO</option>
<option>EL ROSARIO</option>
<option>TLÁHUAC</option>
<option>PERIFÉRICO ORIENTE</option>
</select>

<input id="economico" placeholder="Económico">

<select id="modulo">
<option value="">Seleccionar el Módulo</option>
<option>Módulo 1</option>
<option>Módulo 2</option>
<option>Módulo 3</option>
<option>Módulo 4</option>
<option>Módulo 5</option>
<option>Módulo 6</option>
<option>Módulo 7</option>
</select>

<select id="ruta">
<option value="">Seleccionar la Ruta</option>
<option>47A</option><option>162B</option><option>163A</option><option>163B</option>
<option>164</option><option>166</option><option>168</option><option>1D</option>
<option>101</option><option>102</option><option>108</option><option>25</option>
<option>104</option><option>23</option><option>103</option><option>115A</option>
<option>11A5</option><option>11A7</option><option>116</option><option>119B</option>
<option>124</option><option>124A</option><option>17E</option><option>123A</option>
<option>125</option><option>128</option><option>134C</option><option>134D</option>
<option>162D</option><option>120</option><option>121A</option><option>52C</option>
<option>159</option><option>161</option><option>161C</option><option>161F</option>
<option>162</option><option>165A</option><option>57</option><option>46C</option>
<option>161D</option><option>43</option><option>17F</option><option>81A</option>
<option>143</option><option>69</option><option>131</option><option>132</option>
<option>134</option><option>134A</option><option>134B</option>
<option>19</option><option>19A</option><option>59</option><option>59A</option>
<option>107</option><option>141</option><option>148</option><option>149</option>
<option>162E</option>
</select>

<button class="agregar" onclick="guardar()">Agregar</button>
<button class="total" onclick="generar()">Generar Total</button>
<button class="excel" onclick="exportarExcel()">Excel</button>
<button class="pdf" onclick="exportarPDF()">PDF</button>

</div>

<div class="bloques" id="contenedor"></div>

<div class="resumen-box">
<h4>Resumen</h4>

<table>
<thead>
<tr>
<th>CETRAM</th>
<th>MÓDULO</th>
<th>CANTIDAD</th>
</tr>
</thead>
<tbody id="tablaResumen"></tbody>
</table>

<h4 id="totalGeneral"></h4>

</div>

<script>

let datos = {};

function guardar(){
let c = document.getElementById("cetram").value;
let e = document.getElementById("economico").value;
let m = document.getElementById("modulo").value;
let r = document.getElementById("ruta").value;

if(!e) return alert("Ingresa económico");

if(!datos[c]) datos[c] = [];

datos[c].push({economico:e, modulo:m, ruta:r});

document.getElementById("economico").value="";
render();
}

function render(){
let cont = document.getElementById("contenedor");
cont.innerHTML="";

Object.keys(datos).forEach(c=>{
let html=`<div class="cetram-box"><h3>${c}</h3><table>
<tr><th>Economico</th><th>Modulo</th><th>Ruta</th></tr>`;

datos[c].forEach(d=>{
html+=`<tr><td>${d.economico}</td><td>${d.modulo}</td><td>${d.ruta}</td></tr>`;
});

html+="</table></div>";
cont.innerHTML+=html;
});
}

function generar(){
let resumen = {};
let total = 0;

Object.keys(datos).forEach(c=>{
datos[c].forEach(d=>{
let key = c+"-"+d.modulo;

if(!resumen[key]){
resumen[key]={cetram:c,modulo:d.modulo,cantidad:0};
}

resumen[key].cantidad++;
total++;
});
});

let tbody=document.getElementById("tablaResumen");
tbody.innerHTML="";

Object.values(resumen).forEach(r=>{
tbody.innerHTML+=`<tr>
<td>${r.cetram}</td>
<td>${r.modulo}</td>
<td>${r.cantidad}</td>
</tr>`;
});

document.getElementById("totalGeneral").innerText="TOTAL GENERAL: "+total;
}

function exportarExcel(){
let data=[["CETRAM","MODULO","CANTIDAD"]];

document.querySelectorAll("#tablaResumen tr").forEach(tr=>{
let row=[];
tr.querySelectorAll("td").forEach(td=>row.push(td.innerText));
if(row.length) data.push(row);
});

let ws=XLSX.utils.aoa_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Resumen");
XLSX.writeFile(wb,"Resumen_CETRAM.xlsx");
}

function exportarPDF(){
const { jsPDF } = window.jspdf;
const doc=new jsPDF();

let y=10;
doc.text("Resumen CETRAM",10,y);
y+=10;

document.querySelectorAll("#tablaResumen tr").forEach(tr=>{
let row=[...tr.children].map(td=>td.innerText).join(" | ");
doc.text(row,10,y);
y+=7;
});

doc.text(document.getElementById("totalGeneral").innerText,10,y+10);

doc.save("Resumen_CETRAM.pdf");
}

</script>

</body>
</html>
