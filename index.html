<!DOCTYPE html>
<html>
<head>
    <title>CETRAM RTP</title>

    <style>
        body {
            font-family: Arial;
            background: #eef5ee;
            padding: 20px;
        }

        h2 {
            color: #1b5e20;
        }

        .form {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 6px solid #2e7d32;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .guardar { background: #2e7d32; color: white; }
        .resumen { background: #1b5e20; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #2e7d32;
            color: white;
            font-size: 12px;
        }

        td {
            border: 1px solid #ccc;
            text-align: center;
            padding: 5px;
            font-size: 12px;
        }

        .contenedor {
            overflow-x: auto;
        }

        .resumen-box {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            border-left: 6px solid #2e7d32;
        }
    </style>
</head>

<body>

<h2>🟢 Sistema CETRAM RTP</h2>

<div class="form">
    <select id="cetram">
        <option>ZARAGOZA</option>
        <option>PANTITLÁN</option>
        <option>SANTA MARTA</option>
        <option>INDIOS VERDES</option>
        <option>POTRERO</option>
        <option>LA RAZA</option>
        <option>CHAPULTEPEC</option>
        <option>MIXCOAC</option>
        <option>UNIVERSIDAD</option>
        <option>ZAPATA</option>
        <option>CONSTITUCIÓN DE 1917</option>
        <option>CENTRAL DE ABASTO</option>
        <option>TASQUEÑA</option>
        <option>HUIPULCO</option>
        <option>EL ROSARIO</option>
        <option>TLÁHUAC</option>
        <option>PERIFÉRICO ORIENTE</option>
    </select>

    <input id="codigo" placeholder="Código (ej: 4-1432)">

    <button class="guardar" onclick="guardar()">Agregar</button>
    <button class="resumen" onclick="generar()">Generar Resumen</button>
</div>

<div class="contenedor">
<table>
    <thead>
        <tr id="headers"></tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>
</div>

<div class="resumen-box">
    <h3>📊 Resumen</h3>
    <table>
        <thead>
            <tr>
                <th>CETRAM</th>
                <th>MÓDULO</th>
                <th>CANTIDAD</th>
            </tr>
        </thead>
        <tbody id="resumen"></tbody>
    </table>

    <h3 id="total"></h3>
</div>

<script>
const columnas = [
"ZARAGOZA","PANTITLÁN","SANTA MARTA","INDIOS VERDES","POTRERO","LA RAZA",
"CHAPULTEPEC","MIXCOAC","UNIVERSIDAD","ZAPATA","CONSTITUCIÓN DE 1917",
"CENTRAL DE ABASTO","TASQUEÑA","HUIPULCO","EL ROSARIO","TLÁHUAC","PERIFÉRICO ORIENTE"
];

let datos = JSON.parse(localStorage.getItem("datos")) || {};

// Inicializar estructura
columnas.forEach(c => {
    if (!datos[c]) datos[c] = [];
});

// Crear encabezados
const headerRow = document.getElementById("headers");
columnas.forEach(c => {
    headerRow.innerHTML += `<th>${c}</th>`;
});

function guardar() {
    const cetram = document.getElementById("cetram").value;
    const codigo = document.getElementById("codigo").value;

    if (!codigo) return alert("Ingresa código");

    datos[cetram].push(codigo);

    localStorage.setItem("datos", JSON.stringify(datos));

    document.getElementById("codigo").value = "";

    renderTabla();
}

function renderTabla() {
    const tbody = document.getElementById("tabla");
    tbody.innerHTML = "";

    let maxFilas = Math.max(...columnas.map(c => datos[c].length));

    for (let i = 0; i < maxFilas; i++) {
        let fila = "<tr>";

        columnas.forEach(c => {
            fila += `<td>${datos[c][i] || ""}</td>`;
        });

        fila += "</tr>";
        tbody.innerHTML += fila;
    }
}

function generar() {
    let resumen = {};
    let total = 0;

    columnas.forEach(c => {
        datos[c].forEach(codigo => {
            let modulo = codigo.split("-")[0];

            let key = c + "-" + modulo;

            if (!resumen[key]) {
                resumen[key] = {
                    cetram: c,
                    modulo: modulo,
                    cantidad: 0
                };
            }

            resumen[key].cantidad++;
            total++;
        });
    });

    const tbody = document.getElementById("resumen");
    tbody.innerHTML = "";

    Object.values(resumen).forEach(r => {
        tbody.innerHTML += `
        <tr>
            <td>${r.cetram}</td>
            <td>${r.modulo}</td>
            <td>${r.cantidad}</td>
        </tr>`;
    });

    document.getElementById("total").innerText = "TOTAL GENERAL: " + total;
}

renderTabla();
</script>

</body>
</html>
