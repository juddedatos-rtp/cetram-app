<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuesta de Opinión</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

h1{
text-align:center;
background:#1f4e79;
color:white;
padding:20px;
margin:0;
}

form{
max-width:700px;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

fieldset{
margin-bottom:20px;
border:1px solid #ccc;
padding:15px;
border-radius:6px;
}

legend{
font-weight:bold;
color:#1f4e79;
}

label{
display:block;
margin-top:10px;
}

input,textarea,select{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:4px;
}

button{
margin-top:15px;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

button[type="submit"]{
background:#1f4e79;
color:white;
}

button[type="reset"]{
background:#ccc;
}

</style>
</head>

<body>

<h1>Encuesta de Opinión</h1>

<form id="encuestaForm">

<!-- DATOS PERSONALES -->

<fieldset>

<legend>Datos personales</legend>

<label>Nombre</label>
<input type="text" id="nombre" required>

<label>Edad</label>
<input type="number" id="edad" required>

<label>Género</label>

<input type="radio" name="genero" value="Masculino" required> Masculino
<br>

<input type="radio" name="genero" value="Femenino"> Femenino
<br>

<input type="radio" name="genero" value="Otro"> Otro

</fieldset>


<!-- PREFERENCIAS -->

<fieldset>

<legend>Preferencias</legend>

<p>¿Con qué frecuencia utilizas internet?</p>

<input type="radio" name="frecuencia" value="Diariamente" required> Diariamente
<br>

<input type="radio" name="frecuencia" value="Varias veces a la semana"> Varias veces a la semana
<br>

<input type="radio" name="frecuencia" value="Rara vez"> Rara vez


<p>¿Qué dispositivos usas?</p>

<input type="checkbox" name="dispositivo" value="Computadora"> Computadora
<br>

<input type="checkbox" name="dispositivo" value="Tablet"> Tablet
<br>

<input type="checkbox" name="dispositivo" value="Telefono"> Teléfono
<br>

<input type="checkbox" name="dispositivo" value="Otro"> Otro

</fieldset>


<!-- COMENTARIOS -->

<fieldset>

<legend>Comentarios</legend>

<textarea id="comentarios" rows="4"></textarea>

</fieldset>

<button type="submit">Enviar encuesta</button>
<button type="reset">Limpiar</button>

</form>


<script>

/* PEGAR AQUI TU URL DE GOOGLE SCRIPT */

const scriptURL = "https://script.google.com/macros/s/AKfycby3Er2UenYfFwDtO_miiBM86q9acCMCYOYpR4iT3qUhJpOl47D_6kSwk3jROv3-5--JlA/exec";


document.getElementById("encuestaForm").addEventListener("submit", function(e){

e.preventDefault();

let dispositivos = [];

document.querySelectorAll('input[name="dispositivo"]:checked').forEach(el=>{
dispositivos.push(el.value);
});

const data = {

nombre: document.getElementById("nombre").value,
edad: document.getElementById("edad").value,
genero: document.querySelector('input[name="genero"]:checked').value,
frecuencia: document.querySelector('input[name="frecuencia"]:checked').value,
dispositivos: dispositivos.join(", "),
comentarios: document.getElementById("comentarios").value

};


fetch(scriptURL,{
method:"POST",
body: JSON.stringify(data)
})
.then(res=>{
alert("Encuesta enviada correctamente");
document.getElementById("encuestaForm").reset();
})
.catch(err=>{
alert("Error al enviar la encuesta");
});

});

</script>

</body>
</html>
