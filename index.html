<!DOCTYPE html>
<html>
<head>
    <title>Sistema CETRAM RTP</title>

    <!-- Librerías para exportar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #ffffff;
            padding: 20px;
        }

        h2 {
            color: #2e7d32;
        }

        .form {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 6px solid #66bb6a;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .guardar { background: #2e7d32; color: white; }
        .resumen { background: #388e3c; color: white; }
        .excel { background: #1b5e20; color: white; }
        .pdf { background: #4caf50; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #66bb6a;
            color: black;
            font-size: 12px;
        }

        td {
            border: 1px solid #ccc;
            text-align: center;
            padding: 5px;
            font-size: 12px;
        }

        .contenedor {
            overflow-x: auto;
        }

        .resumen-box {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            border-left: 6px solid #66bb6a;
        }
    </style>
</head>

<body>

<h2>🟢 Sistema CETRAM RTP</h2>

<div class="form">
    <select id="cetram">
        <option>ZARAGOZA</option>
        <option>PANTITLÁN</option>
        <option>SANTA MARTA</option>
        <option>INDIOS VERDES</option>
        <option>POTRERO</option>
        <option>LA RAZA</option>
        <option>CHAPULTEPEC</option>
        <option>MIXCOAC</option>
        <option>UNIVERSIDAD</option>
        <option>ZAPATA</option>
        <option>CONSTITUCIÓN DE 1917</option>
        <option>CENTRAL DE ABASTO</option>
        <option>TASQUEÑA</option>
        <option>HUIPULCO</option>
        <option>EL ROSARIO</option>
        <option>TLÁHUAC</option>
        <option>PERIFÉRICO ORIENTE</option>
    </select>

    <input id="economico" placeholder="Económico">
    <input id="modulo" placeholder="Módulo">
    <input id="ruta" placeholder="Ruta (ej: 4-1432)">

    <button class="guardar" onclick="guardar()">Agregar</button>
    <button class="resumen" onclick="generar()">Generar Resumen</button>
    <button class="excel" onclick="exportarExcel()">Exportar Excel</button>
    <button class="pdf" onclick="exportarPDF()">Exportar PDF</button>
</div>

<div class="contenedor">
<table>
    <thead>
        <tr id="headers"></tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>
</div>

<div class="resumen-box">
    <h3>📊 Resumen</h3>
    <table id="tablaResumen">
        <thead>
            <tr>
                <th>CETRAM</th>
                <th>MÓDULO</th>
                <th>CANTIDAD</th>
            </tr>
        </thead>
        <tbody id="resumen"></tbody>
    </table>

    <h3 id="total"></h3>
</div>

<script>
const columnas = [
"ZARAGOZA","PANTITLÁN","SANTA MARTA","INDIOS VERDES","POTRERO","LA RAZA",
"CHAPULTEPEC","MIXCOAC","UNIVERSIDAD","ZAPATA","CONSTITUCIÓN DE 1917",
"CENTRAL DE ABASTO","TASQUEÑA","HUIPULCO","EL ROSARIO","TLÁHUAC","PERIFÉRICO ORIENTE"
];

let datos = JSON.parse(localStorage.getItem("datos")) || {};

// Inicializar estructura
columnas.forEach(c => {
    if (!datos[c]) datos[c] = [];
});

// Encabezados
const headerRow = document.getElementById("headers");
columnas.forEach(c => {
    headerRow.innerHTML += `<th>${c}</th>`;
});

function guardar() {
    const cetram = document.getElementById("cetram").value;
    const economico = document.getElementById("economico").value;
    const modulo = document.getElementById("modulo").value;
    const ruta = document.getElementById("ruta").value;

    if (!economico || !modulo || !ruta) {
        return alert("Completa todos los campos");
    }

    datos[cetram].push({ economico, modulo, ruta });

    localStorage.setItem("datos", JSON.stringify(datos));

    document.getElementById("economico").value = "";
    document.getElementById("modulo").value = "";
    document.getElementById("ruta").value = "";

    renderTabla();
}

function renderTabla() {
    const tbody = document.getElementById("tabla");
    tbody.innerHTML = "";

    let maxFilas = Math.max(...columnas.map(c => datos[c].length));

    for (let i = 0; i < maxFilas; i++) {
        let fila = "<tr>";

        columnas.forEach(c => {
            if (datos[c][i]) {
                const d = datos[c][i];
                fila += `<td>
                    ${d.economico}<br>
                    M${d.modulo}<br>
                    ${d.ruta}
                </td>`;
            } else {
                fila += `<td></td>`;
            }
        });

        fila += "</tr>";
        tbody.innerHTML += fila;
    }
}

function generar() {
    let resumen = {};
    let total = 0;

    columnas.forEach(c => {
        datos[c].forEach(d => {
            let key = c + "-" + d.modulo;

            if (!resumen[key]) {
                resumen[key] = {
                    cetram: c,
                    modulo: d.modulo,
                    cantidad: 0
                };
            }

            resumen[key].cantidad++;
            total++;
        });
    });

    const tbody = document.getElementById("resumen");
    tbody.innerHTML = "";

    Object.values(resumen).forEach(r => {
        tbody.innerHTML += `
        <tr>
            <td>${r.cetram}</td>
            <td>${r.modulo}</td>
            <td>${r.cantidad}</td>
        </tr>`;
    });

    document.getElementById("total").innerText = "TOTAL GENERAL: " + total;
}

// EXPORTAR A EXCEL
function exportarExcel() {
    let data = [["CETRAM","MODULO","ECONOMICO","RUTA"]];

    columnas.forEach(c => {
        datos[c].forEach(d => {
            data.push([c, d.modulo, d.economico, d.ruta]);
        });
    });

    let ws = XLSX.utils.aoa_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "CETRAM");

    XLSX.writeFile(wb, "CETRAM_RTP.xlsx");
}

// EXPORTAR A PDF
function exportarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 10;
    doc.text("Reporte CETRAM RTP", 10, y);

    y += 10;

    columnas.forEach(c => {
        datos[c].forEach(d => {
            doc.text(`${c} | M${d.modulo} | ${d.economico} | ${d.ruta}`, 10, y);
            y += 7;

            if (y > 280) {
                doc.addPage();
                y = 10;
            }
        });
    });

    doc.save("CETRAM_RTP.pdf");
}

renderTabla();
</script>

</body>
</html>
